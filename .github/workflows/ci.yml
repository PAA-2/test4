name: CI
on:
  push:
    branches: ["main", "work"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: paa
          POSTGRES_USER: paa
          POSTGRES_PASSWORD: paa
        ports:
          - 5432:5432
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    env:
      POSTGRES_DB: paa
      POSTGRES_USER: paa
      POSTGRES_PASSWORD: paa
      POSTGRES_HOST: localhost
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install django==5.* psycopg[binary,pool] redis django-redis django-environ pytest-django ruff black django-guardian openpyxl
      - name: Lint
        run: |
          ruff .
          black --check .
      - name: Test
        run: pytest
